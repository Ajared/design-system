<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button - ajaRed Design System</title>
    <link rel="stylesheet" href="../../../core/tokens.css">
    <link rel="stylesheet" href="./button.css">
    <style>
        body {
            font-family: var(--font-secondary);
            padding: var(--space-8);
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--color-background-secondary);
        }
        .section {
            background: white;
            padding: var(--space-6);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-6);
        }
        .section h2 {
            font-family: var(--font-primary);
            margin-bottom: var(--space-4);
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }
        .demo-row {
            display: flex;
            gap: var(--space-4);
            margin-bottom: var(--space-4);
            flex-wrap: wrap;
        }
        .label {
            font-size: var(--font-size-sm);
            color: var(--color-text-tertiary);
            margin-bottom: var(--space-2);
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <h1 style="font-family: var(--font-primary); margin-bottom: var(--space-4);">Button Component</h1>
    <p style="color: var(--color-text-secondary); margin-bottom: var(--space-8);">Interactive button component with multiple variants and states</p>

    <div class="section">
        <h2>Variants</h2>
        <div class="demo-row">
            <button class="ajr-button ajr-button--primary ajr-button--md">Primary</button>
            <button class="ajr-button ajr-button--secondary ajr-button--md">Secondary</button>
            <button class="ajr-button ajr-button--tertiary ajr-button--md">Tertiary</button>
            <button class="ajr-button ajr-button--ghost ajr-button--md">Ghost</button>
            <button class="ajr-button ajr-button--danger ajr-button--md">Danger</button>
            <button class="ajr-button ajr-button--success ajr-button--md">Success</button>
        </div>
    </div>

    <div class="section">
        <h2>Sizes</h2>
        <div class="demo-row" style="align-items: center;">
            <button class="ajr-button ajr-button--primary ajr-button--sm">Small</button>
            <button class="ajr-button ajr-button--primary ajr-button--md">Medium</button>
            <button class="ajr-button ajr-button--primary ajr-button--lg">Large</button>
        </div>
    </div>

    <div class="section">
        <h2>States</h2>
        <div class="label">Disabled</div>
        <div class="demo-row">
            <button class="ajr-button ajr-button--primary ajr-button--md" disabled>Primary Disabled</button>
            <button class="ajr-button ajr-button--secondary ajr-button--md" disabled>Secondary Disabled</button>
            <button class="ajr-button ajr-button--tertiary ajr-button--md" disabled>Tertiary Disabled</button>
        </div>

        <div class="label" style="margin-top: var(--space-4);">Loading</div>
        <div class="demo-row">
            <button class="ajr-button ajr-button--primary ajr-button--md ajr-button--loading">Loading</button>
            <button class="ajr-button ajr-button--secondary ajr-button--md ajr-button--loading">Loading</button>
            <button class="ajr-button ajr-button--tertiary ajr-button--md ajr-button--loading">Loading</button>
        </div>
    </div>

    <div class="section">
        <h2>With Icons</h2>
        <div class="demo-row">
            <button class="ajr-button ajr-button--primary ajr-button--md">
                <span>⭐</span>
                <span>Star</span>
            </button>
            <button class="ajr-button ajr-button--secondary ajr-button--md">
                <span>Download</span>
                <span>⬇️</span>
            </button>
            <button class="ajr-button ajr-button--tertiary ajr-button--md">
                <span>🔍</span>
                <span>Search</span>
            </button>
        </div>
    </div>

    <div class="section">
        <h2>Icon Only</h2>
        <div class="demo-row">
            <button class="ajr-button ajr-button--primary ajr-button--icon ajr-button--sm">⭐</button>
            <button class="ajr-button ajr-button--primary ajr-button--icon ajr-button--md">⭐</button>
            <button class="ajr-button ajr-button--primary ajr-button--icon ajr-button--lg">⭐</button>
        </div>
    </div>

    <div class="section">
        <h2>Rounded</h2>
        <div class="demo-row">
            <button class="ajr-button ajr-button--primary ajr-button--md ajr-button--rounded">Rounded Primary</button>
            <button class="ajr-button ajr-button--secondary ajr-button--md ajr-button--rounded">Rounded Secondary</button>
            <button class="ajr-button ajr-button--primary ajr-button--icon ajr-button--md ajr-button--rounded">⭐</button>
        </div>
    </div>

    <div class="section">
        <h2>Full Width</h2>
        <button class="ajr-button ajr-button--primary ajr-button--md ajr-button--full">Full Width Button</button>
    </div>

    <div class="section">
        <h2>Button Group</h2>
        <div class="label">Separated</div>
        <div class="ajr-button-group">
            <button class="ajr-button ajr-button--tertiary ajr-button--md">One</button>
            <button class="ajr-button ajr-button--tertiary ajr-button--md">Two</button>
            <button class="ajr-button ajr-button--tertiary ajr-button--md">Three</button>
        </div>

        <div class="label" style="margin-top: var(--space-4);">Attached</div>
        <div class="ajr-button-group ajr-button-group--attached">
            <button class="ajr-button ajr-button--primary ajr-button--md">One</button>
            <button class="ajr-button ajr-button--primary ajr-button--md">Two</button>
            <button class="ajr-button ajr-button--primary ajr-button--md">Three</button>
        </div>
    </div>

    <div class="section">
        <h2>As Links</h2>
        <div class="demo-row">
            <a href="#" class="ajr-button ajr-button--primary ajr-button--md">Link Button</a>
            <a href="#" class="ajr-button ajr-button--secondary ajr-button--md">Link Secondary</a>
        </div>
    </div>
</body>
</html>
